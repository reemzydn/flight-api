apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkin-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkin-api
  template:
    metadata:
      labels:
        app: checkin-api
    spec:
      serviceAccountName: checkin-api-sa
      containers:
      - name: checkin-api
        image: rimzdn/checkin-api
        ports:
        - containerPort: 5001